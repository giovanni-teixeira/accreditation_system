name: Deploy Hakaton Alta Cafe

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            if [ ! -d "$HOME/HAKATON" ]; then
              echo "Pasta do projeto não encontrada. Realizando o Clone Mágico Inicial..."
              cd $HOME
              git clone -b dev https://github.com/MaurilioSemeao/hakaton-alta-cafe.git HAKATON
            fi
            cd $HOME/HAKATON
            git fetch origin
            git checkout dev
            git reset --hard origin/dev
            chmod +x deploy.sh
            ./deploy.sh
