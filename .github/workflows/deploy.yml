name: Deploy Hakaton Alta Cafe

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      # Adicione aqui os passos para deploy no seu servidor web via SSH
      # Exemplo genérico usando appleboy/ssh-action para rodar o deploy.sh
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /caminho/para/o/projeto/HAKATON
            git pull origin main
            chmod +x deploy.sh
            ./deploy.sh
