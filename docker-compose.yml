
services:
  postgres:
    image: postgres:16
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      # [LOCAL] Use 5433 para não conflitar com Postgres local
      # [VPS] Altere para "5432:5432" ou remova se for usar acesso do host
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d alta_cafe"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: backend_api
    restart: always
    env_file: .env
    environment:
      # [LOCAL/VPS] Certifique-se de que o host aqui seja 'postgres' (nome do serviço)
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3001"

  frontend:
    build: ./frontend
    container_name: frontend_main
    restart: always
    expose:
      - "3000"

  alta_cafe:
    build: ./alta_cafe
    container_name: frontend_admin
    restart: always
    expose:
      - "3000"

  scanner:
    build: ./scanner
    container_name: frontend_scanner
    restart: always
    expose:
      - "3000"

  nginx:
    image: nginx:latest
    container_name: nginx_proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
      - alta_cafe
      - scanner

volumes:
  postgres_data:
