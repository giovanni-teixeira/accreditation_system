
services:
  postgres:
    image: postgres:16
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "4lt4C4f3!2026"
      POSTGRES_DB: alta_cafe
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/prisma/init_functions.sql:/docker-entrypoint-initdb.d/init_functions.sql
    ports:
      # [LOCAL] Use 5433 para não conflitar com Postgres local
      # [VPS] Altere para "5432:5432" ou remova se for usar acesso do host
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d alta_cafe"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: backend_api
    restart: always
    env_file: .env
    environment:
      # [LOCAL/VPS] Certifique-se de que o host aqui seja 'postgres' (nome do serviço)
      DATABASE_URL: "postgresql://postgres:4lt4C4f3!2026@postgres:5432/alta_cafe?schema=public"
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3001"

  frontend:
    build: ./frontend
    container_name: frontend_main
    restart: always
    expose:
      - "3000"

  alta_cafe:
    build: ./alta_cafe
    container_name: frontend_admin
    restart: always
    expose:
      - "3000"

  scanner:
    build: ./scanner
    container_name: frontend_scanner
    restart: always
    expose:
      - "3000"

  nginx:
    image: nginx:latest
    container_name: nginx_proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
      - alta_cafe
      - scanner

volumes:
  postgres_data:
