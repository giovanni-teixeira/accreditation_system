
services:
  postgres:
    image: postgres:16
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 4lt4C4f3!2026
      POSTGRES_DB: alta_cafe
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d alta_cafe"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: backend_api
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:4lt4C4f3!2026@postgres:5432/alta_cafe?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3001"

  frontend:
    build: ./frontend
    container_name: frontend_main
    restart: always
    expose:
      - "3000"

  alta_cafe:
    build: ./alta_cafe
    container_name: frontend_admin
    restart: always
    expose:
      - "3000"

  scanner:
    build: ./scanner
    container_name: frontend_scanner
    restart: always
    expose:
      - "3000"

  nginx:
    image: nginx:latest
    container_name: nginx_proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
      - alta_cafe
      - scanner

volumes:
  postgres_data:
