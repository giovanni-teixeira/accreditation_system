events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Otimizações
    sendfile        on;
    keepalive_timeout  65;

    # Configurações globais de proxy
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;

    # Bloco para porta 80 (Somente HTTP para ambiente de desenvolvimento) baseada no feedback do usuário.
    server {
        listen 80;
        server_name _; 

        # Frontend Principal baseada no feedback do usuário.
        location / {
            proxy_pass http://frontend:3000;
        }

        # Admin (Alta Café) baseada no feedback do usuário.
        location /admin {
            proxy_pass http://alta_cafe:3000;
        }

        # Scanner baseada no feedback do usuário.
        location /scanner {
            proxy_pass http://scanner:3000;
        }

        # API Backend baseada no feedback do usuário.
        location /api/ {
            proxy_pass http://backend:3001/;
        }
    }
}
