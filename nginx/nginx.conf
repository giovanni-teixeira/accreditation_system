events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Otimizações
    sendfile        on;
    keepalive_timeout  65;

    # Configurações globais de proxy
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;

    # Redirecionamento Global HTTP -> HTTPS baseada no feedback do usuário.
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # Bloco para porta 443 (HTTPS) baseada no feedback do usuário.
    server {
        listen 443 ssl;
        server_name _; 

        # Certificados SSL (Gerenciados pelos scripts de deploy) baseada no feedback do usuário.
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Frontend Principal
        location / {
            proxy_pass http://frontend:3000;
        }

        # Admin (Alta Café)
        location /admin {
            proxy_pass http://alta_cafe:3000;
        }

        # Scanner
        location /scanner {
            proxy_pass http://scanner:3000;
        }

        # API Backend
        location /api/ {
            proxy_pass http://backend:3001/;
        }
    }
}
